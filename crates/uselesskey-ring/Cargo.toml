[package]
name = "uselesskey-ring"
version = "0.7.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "ring 0.17 adapter traits for uselesskey RSA/ECDSA/Ed25519 fixtures."
categories.workspace = true
keywords = ["ring", "signing", "fixtures", "testing", "adapter"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-ring"
authors.workspace = true

[dependencies]
ring = "0.17"

# Key type crates (all optional)
uselesskey-rsa = { path = "../uselesskey-rsa", version = "0.7.0", optional = true }
uselesskey-ecdsa = { path = "../uselesskey-ecdsa", version = "0.7.0", optional = true }
uselesskey-ed25519 = { path = "../uselesskey-ed25519", version = "0.7.0", optional = true }

[package.metadata.docs.rs]
features = ["all"]

[features]
default = []
rsa = ["dep:uselesskey-rsa"]
ecdsa = ["dep:uselesskey-ecdsa"]
ed25519 = ["dep:uselesskey-ed25519"]
all = ["rsa", "ecdsa", "ed25519"]

[dev-dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.7.0" }
hex = "0.4"
serde.workspace = true
insta.workspace = true
proptest.workspace = true


[lints]
workspace = true
