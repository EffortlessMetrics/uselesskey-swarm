[package]
name = "uselesskey-jwk"
version = "0.9.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Typed JWK/JWKS models, builders, ordering, and negative fixtures."
categories.workspace = true
keywords = ["jwk", "jwks", "jwt", "fixtures", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-jwk"
authors.workspace = true

[dependencies]
base64.workspace = true
blake3.workspace = true
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }

[features]
default = ["json"]
json = ["dep:serde", "dep:serde_json"]

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
uselesskey-test-support.workspace = true

[package.metadata.docs.rs]
all-features = true


[lints]
workspace = true
