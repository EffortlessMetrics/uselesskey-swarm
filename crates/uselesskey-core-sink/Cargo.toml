[package]
name = "uselesskey-core-sink"
version = "0.7.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Tempfile-backed artifact sinks used by uselesskey."
categories.workspace = true
keywords = ["fixtures", "tempfile", "testing", "pki", "interop"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-sink"
authors.workspace = true

[dependencies]
tempfile.workspace = true
uselesskey-core = { path = "../uselesskey-core", version = "0.7.1" }

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
rstest.workspace = true
serde.workspace = true

[package.metadata.docs.rs]
all-features = true


[lints]
workspace = true
