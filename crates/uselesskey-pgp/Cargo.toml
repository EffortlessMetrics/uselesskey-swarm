[package]
name = "uselesskey-pgp"
version = "0.7.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "OpenPGP key fixtures (armored and binary) for deterministic and random tests."
categories.workspace = true
keywords = ["openpgp", "pgp", "fixtures", "testing", "deterministic"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-pgp"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.7.1" }
pgp = { version = "0.19.0", default-features = false }
rand_chacha = { version = "0.3.1", default-features = false }
rand_core = { version = "0.6.4", default-features = false }

[dev-dependencies]
proptest.workspace = true
serde.workspace = true
insta.workspace = true

[package.metadata.docs.rs]
all-features = true


[lints]
workspace = true
