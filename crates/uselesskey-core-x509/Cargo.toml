[package]
name = "uselesskey-core-x509"
version = "0.7.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic X.509 policy helpers shared by uselesskey fixture crates."
categories.workspace = true
keywords = ["x509", "deterministic", "fixtures", "certificate", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-x509"
authors.workspace = true

[dependencies]
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.7.1" }

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
rstest.workspace = true
serde = { workspace = true, features = ["derive"] }
uselesskey-core-seed.workspace = true
uselesskey-test-support = { workspace = true }

[package.metadata.docs.rs]
all-features = true


[lints]
workspace = true
