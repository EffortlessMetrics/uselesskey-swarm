[package]
name = "uselesskey-rsa"
version = "0.9.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "RSA key fixtures (PKCS#8/SPKI, PEM/DER) with negative variants for tests."
categories.workspace = true
keywords = ["rsa", "pkcs8", "spki", "fixtures", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-rsa"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.9.1" }
rsa.workspace = true
rsa09 = { package = "rsa", version = "0.9.10", features = ["pem"], optional = true }
rand_chacha = { version = "0.3.1", default-features = false, optional = true }
rand_core = { version = "0.6.4", default-features = false, optional = true }
rand_core10.workspace = true
rand_chacha10.workspace = true

# Optional JWK/JWKS support
serde_json = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
uselesskey-jwk = { path = "../uselesskey-jwk", version = "0.9.1", optional = true }

[features]
default = ["legacy-rsa09"]
legacy-rsa09 = ["dep:rsa09", "dep:rand_chacha", "dep:rand_core"]
jwk = ["dep:serde_json", "dep:base64", "dep:uselesskey-jwk"]

[package.metadata.docs.rs]
features = ["jwk"]

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
rstest.workspace = true
serde.workspace = true
uselesskey-test-support = { workspace = true }


[lints]
workspace = true
