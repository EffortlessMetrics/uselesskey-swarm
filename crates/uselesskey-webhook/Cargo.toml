[package]
name = "uselesskey-webhook"
version = "0.6.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic webhook fixtures for GitHub, Stripe, and Slack signature tests."
categories.workspace = true
keywords = ["webhook", "hmac", "fixtures", "testing", "deterministic"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-webhook"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.6.0" }
rand_chacha10.workspace = true
rand_core10.workspace = true
base64.workspace = true
hmac = "0.13.0-rc.6"
sha2 = "0.11"
hex = "0.4"
serde_json.workspace = true

[dev-dependencies]
insta.workspace = true

[package.metadata.docs.rs]
all-features = true
