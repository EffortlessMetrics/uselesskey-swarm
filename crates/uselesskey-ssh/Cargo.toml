[package]
name = "uselesskey-ssh"
version = "0.9.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic OpenSSH key and certificate fixtures for infra and deployment tests."
categories.workspace = true
keywords = ["ssh", "openssh", "fixtures", "testing", "deterministic"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-ssh"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.9.0" }
ssh-key = { version = "0.6.7", default-features = false, features = ["std", "ed25519", "rsa", "rand_core"] }
rand_chacha = { version = "0.3.1", default-features = false }

[dev-dependencies]
proptest.workspace = true
uselesskey-test-support = { workspace = true }

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true
