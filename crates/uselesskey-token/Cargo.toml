[package]
name = "uselesskey-token"
version = "0.9.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "API key, bearer, and OAuth access-token fixture generator for tests."
categories.workspace = true
keywords = ["token", "api-key", "oauth", "fixtures", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-token"
authors.workspace = true

[dependencies]
base64.workspace = true
rand_chacha10.workspace = true
rand_core10.workspace = true
serde_json.workspace = true
uselesskey-core = { path = "../uselesskey-core", version = "0.9.1" }

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
serde.workspace = true
uselesskey-test-support = { workspace = true }

[package.metadata.docs.rs]
all-features = true


[lints]
workspace = true
