[package]
name = "uselesskey-x509"
version = "0.9.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "X.509 self-signed and chain certificate fixtures with negative variants for tests."
categories.workspace = true
keywords = ["x509", "certificate", "tls", "fixtures", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-x509"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.9.1" }
uselesskey-rsa = { path = "../uselesskey-rsa", version = "0.9.1" }
uselesskey-jwk = { path = "../uselesskey-jwk", version = "0.9.1", optional = true }
rcgen = "0.14.8"
rustls-pki-types = "1"
x509-parser = "0.18"
time = "0.3"
rsa.workspace = true
base64.workspace = true
rand_chacha = { version = "0.3.1", default-features = false }
rand_core = { version = "0.6.4", default-features = false }
rand_chacha10.workspace = true
rand_core10.workspace = true

[package.metadata.docs.rs]
features = ["jwk"]

[features]
jwk = ["dep:uselesskey-jwk", "uselesskey-rsa/jwk"]

[dev-dependencies]
proptest.workspace = true
rstest.workspace = true
insta.workspace = true
serde = { workspace = true, features = ["derive"] }
uselesskey-test-support = { workspace = true }


[lints]
workspace = true
