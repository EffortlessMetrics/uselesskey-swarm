[package]
name = "uselesskey-ecdsa"
version = "0.7.1"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "ECDSA P-256/P-384 key fixtures (PKCS#8/SPKI, PEM/DER) for tests."
categories.workspace = true
keywords = ["ecdsa", "p256", "p384", "fixtures", "testing"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-ecdsa"
authors.workspace = true

[dependencies]
uselesskey-core = { path = "../uselesskey-core", version = "0.7.1" }

# Elliptic curve support from RustCrypto's current RC line
p256 = { version = "0.14.0-rc.8", features = ["ecdsa", "pkcs8", "pem"] }
p384 = { version = "0.14.0-rc.8", features = ["ecdsa", "pkcs8", "pem"] }
elliptic-curve = { version = "0.14.0-rc.29", features = ["pkcs8", "pem", "sec1"] }
rand_chacha10.workspace = true
rand_core10.workspace = true

# Optional JWK/JWKS support
serde_json = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
uselesskey-jwk = { path = "../uselesskey-jwk", version = "0.7.1", optional = true }

[features]
default = []
jwk = ["dep:serde_json", "dep:base64", "dep:uselesskey-jwk"]

[package.metadata.docs.rs]
features = ["jwk"]

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
rstest.workspace = true
serde.workspace = true


[lints]
workspace = true
