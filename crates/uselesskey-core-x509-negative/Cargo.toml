[package]
name = "uselesskey-core-x509-negative"
version = "0.7.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "X.509 negative-fixture policy helpers for uselesskey."
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
categories.workspace = true
keywords = ["x509", "fixtures", "negative", "testing", "ca"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-x509-negative"
authors.workspace = true

[dependencies]
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.7.0" }

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
rstest.workspace = true
serde = { workspace = true, features = ["derive"] }
uselesskey-core-x509-chain-negative = { path = "../uselesskey-core-x509-chain-negative", version = "0.7.0" }
uselesskey-core-x509-spec = { path = "../uselesskey-core-x509-spec", version = "0.7.0" }

[features]
default = ["std"]
std = []

[package.metadata.docs.rs]
features = ["std"]



[lints]
workspace = true
