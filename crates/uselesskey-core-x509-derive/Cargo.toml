[package]
name = "uselesskey-core-x509-derive"
version = "0.7.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Deterministic X.509 derivation helpers for uselesskey fixture crates."
categories.workspace = true
keywords = ["x509", "deterministic", "serial", "time", "fixtures"]
readme = "README.md"
exclude = ["fuzz/**", "corpus/**", "**/*.der", "**/*.pem"]
homepage.workspace = true
documentation = "https://docs.rs/uselesskey-core-x509-derive"
authors.workspace = true

[dependencies]
uselesskey-x509 = { path = "../uselesskey-x509", version = "0.7.0" }

[dev-dependencies]
insta.workspace = true
proptest.workspace = true
serde = { workspace = true, features = ["derive"] }
rcgen = "0.14.7"
time = "0.3"
uselesskey-core-hash = { workspace = true }
uselesskey-core-seed.workspace = true

[package.metadata.docs.rs]
all-features = true


[lints]
workspace = true
