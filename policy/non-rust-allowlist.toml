# Effortless Metrics — non-Rust file policy allowlist
#
# Rust and `xtask` are the default implementation surface. Any tracked file
# that is not Rust source, a `Cargo.toml`/`Cargo.lock`, or a `.md` doc requires
# an approved entry in this file with owner, surface, classification, reason,
# and `covered_by` evidence.
#
# Owner: repo-policy
# See: docs/FILE_POLICY.md, docs/POLICY_ALLOWLISTS.md
schema_version = "1.0"

[policy]
# Files are matched in order; the first match wins.
# Globs use forward-slash repo-relative paths.
# Default-allowed extensions (no entry required) are listed here for
# transparency only — they are still classified by the checker.
default_allowed_extensions = ["rs", "toml", "md"]
# Default-allowed top-level filenames that have no extension.
default_allowed_filenames = [
  "LICENSE-APACHE",
  "LICENSE-MIT",
  "CODEOWNERS",
  ".gitignore",
  ".gitattributes",
  ".editorconfig",
]

# === CI / declarative configuration ==========================================

[[allow]]
glob = ".github/workflows/*.yml"
kind = "ci_declarative"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "GitHub Actions workflow definitions are platform-required YAML."
covered_by = ["cargo xtask ci"]

[[allow]]
glob = ".github/*.yml"
kind = "github_meta"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "GitHub repo metadata: settings, dependabot, funding, release notes."
covered_by = ["GitHub schema validation"]

[[allow]]
glob = "codecov.yml"
kind = "ci_coverage_policy"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "Codecov status and reporting configuration for cargo-llvm-cov coverage uploads."
covered_by = ["cargo xtask check-file-policy"]

[[allow]]
glob = "lefthook.yml"
kind = "git_hooks_config"
owner = "repo-policy"
surface = "tooling"
classification = "config"
reason = "Lefthook git-hook configuration."
covered_by = ["lefthook run pre-commit"]

# === Repo automation / scripts ==============================================

[[allow]]
glob = "scripts/*.py"
kind = "ci_helper_script"
owner = "release/ci"
surface = "ci"
classification = "tooling"
reason = "Small CI helper scripts used to project generated evidence into GitHub Actions annotations."
covered_by = ["python scripts/ripr-annotations.py", "cargo xtask check-file-policy"]

[[allow]]
glob = ".uselesskey/goals/archive/.gitkeep"
kind = "active_goal_archive_placeholder"
owner = "repo-policy"
surface = "ops"
classification = "config"
reason = "Keeps the active-goal archive directory present before the first archived lane file is written."
covered_by = ["cargo xtask spec-check --strict", "cargo xtask check-file-policy"]

# === Repo automation / hooks ================================================

