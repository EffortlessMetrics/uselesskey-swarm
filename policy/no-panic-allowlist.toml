# Effortless Metrics — semantic no-panic allowlist
#
# Authoritative ledger of receipted panic-family debt. Each `[[allow]]` entry
# is identified by `path + family + selector`; line/column are advisory
# `last_seen` hints only.
#
# Owner: repo-policy
# See: docs/NO_PANIC_POLICY.md, docs/POLICY_ALLOWLISTS.md
#
# The checker currently runs in no-new-debt mode: existing findings are covered
# by `policy/no-panic-baseline.toml`, while new findings must be removed or
# deliberately moved here with owner/reason/expiry. Once reviewed debt has moved
# out of the baseline, this policy can advance to `mode = "blocking"`.
schema_version = "0.3"

[policy]
# Families enforced by `cargo xtask check-no-panic-family`.
families = [
  "unwrap",
  "expect",
  "panic_macro",
  "todo",
  "unimplemented",
  "unreachable",
  "indexing",
  "string_slice",
  "get_unwrap",
  "unchecked_time_subtraction",
]
# Modes:
#   - `advisory`: report findings, never fail.
#   - `no-new-debt`: fail when a finding is *not* covered by either this
#     allowlist or `policy/no-panic-baseline.toml`. New panic-family debt
#     introduced by a PR fails CI; existing baselined debt does not.
#   - `blocking`: fail on any finding not in the allowlist (ignores baseline).
mode = "no-new-debt"

# Each [[allow]] looks like:
#
# [[allow]]
# id = "panic-0001"
# path = "crates/example/src/parser.rs"
# family = "unwrap"
# classification = "test_helper"   # one of: production, test_helper, fixture, infallible_invariant, build_script
# owner = "core"
# explanation = "Fixture builder; migrate to fallible API in next minor."
# expires = "2026-09-01"
#
# [allow.selector]
# kind = "method_call"
# container = "load_fixture"
# callee = "unwrap"
# receiver_fingerprint = "std::fs::read_to_string(path)"
#
# [allow.last_seen]
# line = 42
# column = 17
#
[[allow]]
id = "panic-x509-chain-rcgen-cert-invariant"
path = "crates/uselesskey-x509/src/chain.rs"
family = "expect"
classification = "infallible_invariant"
owner = "x509"
explanation = "X.509 chain generation uses deterministic internally generated rcgen parameters and key material behind the current non-fallible fixture API; migrate to a fallible chain API before this expires."
expires = "2026-11-13"

[allow.selector]
kind = "method_call"
callee = "expect"

[allow.last_seen]
line = 572
column = 13

