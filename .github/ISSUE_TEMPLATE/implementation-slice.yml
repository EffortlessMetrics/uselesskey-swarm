name: Implementation slice
description: Plan one PR-sized implementation slice from existing source-of-truth artifacts.
title: "slice: "
labels:
  - implementation
body:
  - type: input
    id: linked_proposal
    attributes:
      label: Linked proposal
      placeholder: USELESSKEY-PROP-0000
    validations:
      required: true
  - type: input
    id: linked_spec
    attributes:
      label: Linked spec
      placeholder: USELESSKEY-SPEC-0000
    validations:
      required: true
  - type: input
    id: linked_plan_item
    attributes:
      label: Linked plan item
      description: Work item ID or plan heading.
      placeholder: source-of-truth-example
    validations:
      required: true
  - type: input
    id: rails_lane
    attributes:
      label: Rails lane
      description: Rails lane ID or path, when this slice is tied to `.rails/index.toml`.
      placeholder: RAILS-LANE-0000 or none
  - type: input
    id: active_goal
    attributes:
      label: Active goal
      description: `.uselesskey/goals` goal ID when this slice is tied to the legacy active-goal control plane.
      placeholder: none
  - type: textarea
    id: expected_files
    attributes:
      label: Expected files
      description: Files or directories expected to change.
      render: text
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What must remain out of scope?
    validations:
      required: true
  - type: checkboxes
    id: release_source_boundary
    attributes:
      label: Release/source boundary
      description: Confirm whether this slice stays inside the swarm development boundary.
      options:
        - label: This slice does not publish crates, create tags, sign artifacts, push to crates.io, create GitHub releases, or move source-sync authority.
          required: true
  - type: textarea
    id: proof_commands
    attributes:
      label: Proof commands
      description: Commands this PR must run.
      render: bash
    validations:
      required: true
  - type: textarea
    id: claim_boundary
    attributes:
      label: Claim boundary
      description: What this slice proves, and what it does not prove.
    validations:
      required: true
  - type: textarea
    id: rollback
    attributes:
      label: Rollback
      description: How to revert safely.
    validations:
      required: true
