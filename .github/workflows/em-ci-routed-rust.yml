            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'rm -rf /workspace/target' || true

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          docker run --rm \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${CARGO_TARGET_DIR}:/cargo-target" \
            "${IMAGE}" \
            bash -c '
              rm -rf /tmp/jobtmp/* /tmp/jobtmp/.[!.]* /tmp/jobtmp/..?* 2>/dev/null || true
              rm -rf /cargo-target/* /cargo-target/.[!.]* /cargo-target/..?* 2>/dev/null || true
            ' || true
          rmdir "$TMPDIR" 2>/dev/null || true
          rmdir "$CARGO_TARGET_DIR" 2>/dev/null || true

      - name: Disk report
        if: always()
        shell: bash
        run: df -h / /mnt/docker /mnt/actions /mnt/ci-scratch /mnt/ci-cache /mnt/ci-artifacts 2>/dev/null || true

  uselesskey-rust-small-github:
    name: Uselesskey Rust Small on GitHub Hosted
    needs: route-uselesskey-rust-small
    if: needs.route-uselesskey-rust-small.outputs.target == 'github' && needs.route-uselesskey-rust-small.outputs.fallback_allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - name: Tiny hosted fallback check
        run: cargo check --workspace --locked --all-targets

  uselesskey-workflow-validation:
    name: Uselesskey Workflow Validation on GitHub Hosted
    needs: route-uselesskey-rust-small
    if: needs.route-uselesskey-rust-small.outputs.target == 'workflow'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check runner routing guard
        run: ci/check-bare-self-hosted.sh

      - name: Parse workflow YAML
        shell: bash
        run: |
          set -euo pipefail
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.load_file(path); puts "parsed #{path}" }' .github/workflows/*.yml

  uselesskey-route-failed:
    name: Uselesskey Route Failed
    needs: route-uselesskey-rust-small
    if: needs.route-uselesskey-rust-small.outputs.target == 'route-fail'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail with explicit routing reason
        shell: bash
        run: |
          echo "Routing failed: ${{ needs.route-uselesskey-rust-small.outputs.reason }}" >&2
          echo "To allow hosted fallback for PR branch protection, add the allow-github-hosted label and push or reopen the PR to create a fresh pull_request event." >&2
          echo "Use workflow_dispatch force_target=github only as ad hoc branch proof; it does not update the PR-required check." >&2
          exit 1

  uselesskey-docs-policy-light:
    name: Uselesskey Docs/Policy Light on GitHub Hosted
    needs: route-uselesskey-rust-small
    if: needs.route-uselesskey-rust-small.outputs.target == 'docs'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli

      - name: docs-sync check
        run: cargo xtask docs-sync --check

      - name: typos check
        run: cargo xtask typos

  uselesskey-rust-small-result:
    name: Uselesskey Rust Small Result
    needs:
      - route-uselesskey-rust-small
      - uselesskey-rust-small-cpx42
      - uselesskey-rust-small-cx43
      - uselesskey-rust-small-cx53
      - uselesskey-rust-small-github
      - uselesskey-workflow-validation
      - uselesskey-docs-policy-light
      - uselesskey-route-failed
      - main-full-gate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate router and selected target
        shell: bash
        env:
          TARGET: ${{ needs.route-uselesskey-rust-small.outputs.target }}
          ROUTER_RESULT: ${{ needs.route-uselesskey-rust-small.result }}
          CPX42_RESULT: ${{ needs.uselesskey-rust-small-cpx42.result }}
          CX43_RESULT: ${{ needs.uselesskey-rust-small-cx43.result }}
          CX53_RESULT: ${{ needs.uselesskey-rust-small-cx53.result }}
          GITHUB_RESULT: ${{ needs.uselesskey-rust-small-github.result }}
          WORKFLOW_RESULT: ${{ needs.uselesskey-workflow-validation.result }}
          DOCS_RESULT: ${{ needs.uselesskey-docs-policy-light.result }}
          MAIN_FULL_RESULT: ${{ needs.main-full-gate.result }}
        run: |
          set -eu
          echo "router_target=${TARGET:-<empty>}"
          echo "router_result=${ROUTER_RESULT:-<empty>}"
          echo "cpx42_result=${CPX42_RESULT:-<empty>}"
          echo "cx43_result=${CX43_RESULT:-<empty>}"
          echo "cx53_result=${CX53_RESULT:-<empty>}"
          echo "github_result=${GITHUB_RESULT:-<empty>}"
          echo "workflow_result=${WORKFLOW_RESULT:-<empty>}"
          echo "docs_result=${DOCS_RESULT:-<empty>}"
          echo "main_full_result=${MAIN_FULL_RESULT:-<empty>}"

          if [ "${ROUTER_RESULT}" != "success" ]; then
            echo "router job did not succeed; failing normalized result" >&2
            exit 1
          fi

          case "${TARGET}" in
            cpx42)
              if [ "${CPX42_RESULT}" != "success" ]; then
                echo "selected target cpx42 but result was ${CPX42_RESULT}" >&2
                exit 1
              fi
              ;;
            cx43)
              if [ "${CX43_RESULT}" != "success" ]; then
                echo "selected target cx43 but result was ${CX43_RESULT}" >&2
                exit 1
              fi
              ;;
            cx53)
              if [ "${CX53_RESULT}" != "success" ]; then
                echo "selected target cx53 but result was ${CX53_RESULT}" >&2
                exit 1
              fi
              ;;
            github)
              if [ "${GITHUB_RESULT}" != "success" ]; then
                echo "selected target github but result was ${GITHUB_RESULT}" >&2
                exit 1
              fi
              ;;
            workflow)
              if [ "${WORKFLOW_RESULT}" != "success" ]; then
                echo "selected target workflow but result was ${WORKFLOW_RESULT}" >&2
                exit 1
              fi
              ;;
            docs)
              if [ "${DOCS_RESULT}" != "success" ]; then
                echo "selected target docs but result was ${DOCS_RESULT}" >&2
                exit 1
              fi
              ;;
            main-full)
              if [ "${MAIN_FULL_RESULT}" != "success" ]; then
                echo "selected target main-full but result was ${MAIN_FULL_RESULT}" >&2
                exit 1
              fi
              ;;
            *)
              echo "router produced unknown target: ${TARGET}" >&2
              exit 1
              ;;
          esac

          echo "Uselesskey Rust Small Result: success"

  main-full-gate:
    name: Uselesskey Main Full Gate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.run_full_gate)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz,cargo-mutants,typos-cli,cargo-deny

      - name: Toolchain diagnostics
        run: |
          rustc -vV
          cargo +nightly -vV
          cargo deny --version
          cargo fuzz --version
          cargo mutants --version
          typos --version
          nasm -v

      - name: xtask ci
        run: cargo xtask ci

      - name: Upload receipt
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: receipt-main-full-gate
          path: target/xtask/receipt.json
          if-no-files-found: warn
