name: EM CI Routed Rust

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:
    inputs:
      force_target:
        description: "Force a runner target for proof runs"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - cx43
          - cpx42
          - cx53
          - github
      run_full_gate:
        description: "Also run the hosted full main gate"
        required: false
        default: false
        type: boolean

concurrency:
  group: em-ci-routed-rust-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  # Keep one active run plus one pending replacement slot for heavy/core CI.
  # New pushes replace older pending runs, but do not cancel an in-progress run.
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  route-uselesskey-rust-small:
    name: Route Uselesskey Rust Small
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      target: ${{ steps.route.outputs.target }}
      reason: ${{ steps.route.outputs.reason }}
      error: ${{ steps.route.outputs.error }}
      fallback_allowed: ${{ steps.route.outputs.fallback_allowed }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Decide target runner
        id: route
        env:
          GH_TOKEN: ${{ secrets.EM_RUNNER_READ_TOKEN }}
          ORG: EffortlessMetrics
          FORCE_TARGET: ${{ inputs.force_target || 'auto' }}
          RUN_FULL_GATE: ${{ inputs.run_full_gate || false }}
          EVENT_NAME: ${{ github.event_name }}
          ALLOW_GITHUB_HOSTED: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'allow-github-hosted') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
          SELF_HOSTED_READY: ${{ vars.USELESSKEY_SELF_HOSTED_READY || 'false' }}
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        shell: bash
        run: |
          set -eu

          emit() {
            local target="$1" reason="$2" error="$3" fallback_allowed="$4"
            echo "router_target=$target"
            echo "router_reason=$reason"
            echo "router_error=$error"
            echo "router_fallback_allowed=$fallback_allowed"
            {
              echo "target=$target"
              echo "reason=$reason"
              echo "error=$error"
              echo "fallback_allowed=$fallback_allowed"
            } >> "$GITHUB_OUTPUT"
          }

          case "${FORCE_TARGET}" in
            auto|"") ;;
            cx43|cpx42|cx53|github)
              emit "${FORCE_TARGET}" "forced_${FORCE_TARGET}" "false" "true"
              exit 0
              ;;
            *)
              emit "github" "invalid_force_target" "true" "false"
              exit 0
              ;;
          esac

          if [ "${EVENT_NAME}" = "push" ] || [ "${RUN_FULL_GATE}" = "true" ]; then
            emit "main-full" "main_full_gate" "false" "false"
            exit 0
          fi

          if [ "${IS_FORK_PR}" = "true" ]; then
            emit "github" "fork_pr" "false" "true"
            exit 0
          fi

          changed_files() {
            case "${EVENT_NAME}" in
              pull_request)
                if [ -z "${BASE_SHA}" ] || [ -z "${HEAD_SHA}" ]; then
                  return 1
                fi
                git diff --name-only "${BASE_SHA}...${HEAD_SHA}"
                ;;
              push)
                if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
                  return 1
                fi
                git diff --name-only "${BEFORE_SHA}" "${HEAD_SHA}"
                ;;
              *)
                return 1
                ;;
            esac
          }

          classify_change() {
            if ! files="$(changed_files 2>/tmp/diff.err)"; then
              echo "rust"
              return 0
            fi

            if [ -z "${files}" ]; then
              echo "rust"
              return 0
            fi

            echo "changed_files:"
            printf '%s\n' "${files}"

            local all_light="true"
            while IFS= read -r path; do
              case "${path}" in
                .github/workflows/*)
                  echo "workflow"
                  return 0
                  ;;
                README.md|CHANGELOG.md|SECURITY.md|CONTRIBUTING.md|LICENSE|LICENSE-*|NOTICE|AGENTS.md|docs/*|docs/tracking/*|badges/*|policy/*|plans/*|ci/hardware/*|.rails/*|.uselesskey/*|.codex/campaigns/*|.github/CODEOWNERS|.github/dependabot.yml|.github/pull_request_template.md|.github/PULL_REQUEST_TEMPLATE.md|.github/PULL_REQUEST_TEMPLATE/*)
                  ;;
                *)
                  all_light="false"
                  ;;
              esac
            done <<EOF
          ${files}
          EOF

            if [ "${all_light}" = "true" ]; then
              echo "docs"
            else
              echo "rust"
            fi
          }

          change_class="$(classify_change | tail -n 1)"
          echo "change_class=${change_class}"

          case "${change_class}" in
            docs)
              emit "docs" "docs_policy_light" "false" "false"
              exit 0
              ;;
            workflow)
              emit "workflow" "workflow_validation" "false" "false"
              exit 0
              ;;
            rust) ;;
            *)
              emit "route-fail" "unknown_change_class" "true" "false"
              exit 0
              ;;
          esac

          if [ "${SELF_HOSTED_READY}" != "true" ]; then
            if [ "${ALLOW_GITHUB_HOSTED}" = "true" ]; then
              emit "github" "self_hosted_not_marked_ready_allowlisted" "false" "true"
            else
              emit "route-fail" "self_hosted_not_marked_ready" "true" "false"
            fi
            exit 0
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            emit "route-fail" "runner_token_missing" "true" "false"
            exit 0
          fi

          if ! runners_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "orgs/${ORG}/actions/runners?per_page=100" 2>/tmp/gh.err)"; then
            echo "runner API request failed:" >&2
            cat /tmp/gh.err >&2 || true
            if rg -q "401|Bad credentials" /tmp/gh.err; then
              emit "route-fail" "runner_token_unauthorized" "true" "false"
            elif rg -q "403|Resource not accessible" /tmp/gh.err; then
              emit "route-fail" "runner_token_forbidden" "true" "false"
            else
              emit "route-fail" "runner_api_failed" "true" "false"
            fi
            exit 0
          fi

          idle_runner_count() {
            local runner_label="$1"
            local runner_size_label="$2"
            printf '%s' "$runners_json" | jq \
              --arg runner_label "$runner_label" \
              --arg runner_size_label "$runner_size_label" \
              '
              [ .runners[]?
                | select(.status == "online")
                | select(.busy == false)
                | ([.labels[].name] // []) as $have
                | select(
                    ($have | index("em-ci")) and
                    ($have | index($runner_label)) and
                    ($have | index($runner_size_label)) and
                    ($have | index("trusted-pr"))
                  )
              ] | length
            '
          }

          if ! idle_cx43="$(idle_runner_count "cx43" "rust-medium" 2>/tmp/jq.err)"; then
            echo "runner API parse failed:" >&2
            cat /tmp/jq.err >&2 || true
            emit "route-fail" "parse_failed" "true" "false"
            exit 0
          fi

          if ! idle_cx53="$(idle_runner_count "cx53" "rust-large" 2>/tmp/jq.err)"; then
            echo "runner API parse failed:" >&2
            cat /tmp/jq.err >&2 || true
            emit "route-fail" "parse_failed" "true" "false"
            exit 0
          fi

          if ! idle_cpx42="$(idle_runner_count "cpx42" "rust-medium" 2>/tmp/jq.err)"; then
            echo "runner API parse failed:" >&2
            cat /tmp/jq.err >&2 || true
            emit "route-fail" "parse_failed" "true" "false"
            exit 0
          fi

          echo "idle_cx43=${idle_cx43:-0}"
          echo "idle_cpx42=${idle_cpx42:-0}"
          echo "idle_cx53=${idle_cx53:-0}"

          if [ "${idle_cx43:-0}" -gt 0 ]; then
            emit "cx43" "cx43_idle" "false" "false"
          elif [ "${idle_cpx42:-0}" -gt 0 ]; then
            emit "cpx42" "cpx42_idle" "false" "false"
          elif [ "${idle_cx53:-0}" -gt 0 ]; then
            emit "cx53" "cx53_idle" "false" "false"
          else
            if [ "${ALLOW_GITHUB_HOSTED}" = "true" ]; then
              emit "github" "no_idle_runner_allowlisted" "false" "true"
            else
              emit "route-fail" "no_idle_runner" "true" "false"
            fi
          fi

  uselesskey-rust-small-cpx42:
    name: Uselesskey Rust Small on CPX42
    needs: route-uselesskey-rust-small
    if: needs.route-uselesskey-rust-small.outputs.target == 'cpx42' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cpx42, rust-16gb, rust-medium, trusted-pr]
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: "7"
      CARGO_INCREMENTAL: "0"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/uselesskey/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Prepare CPX42 scratch
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 45
          ci-disk-guard /mnt/ci-cache 10
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR"

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Preflight disk and toolchain
        shell: bash
        run: |
          set -euo pipefail
          df -h /mnt/ci-scratch /mnt/ci-cache || true
          rustc --version
          cargo --version
          if command -v python3 >/dev/null 2>&1; then python3 --version; fi
          if command -v sccache >/dev/null 2>&1; then sccache --show-stats || true; fi

      - name: Run Rust small gate
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p xtask -- gate --check

      - name: Cleanup and final stats
        if: always()
        shell: bash
        run: |
          set +e
          if command -v sccache >/dev/null 2>&1; then sccache --show-stats || true; fi
          rm -rf "$TMPDIR" "$CARGO_TARGET_DIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true

  uselesskey-rust-small-cx43:
    name: Uselesskey Rust Small on CX43
    needs: route-uselesskey-rust-small
    if: needs.route-uselesskey-rust-small.outputs.target == 'cx43' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx43, rust-medium, trusted-pr]
    timeout-minutes: 90
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 30G
      RUSTC_WRAPPER: /usr/local/cargo/bin/sccache
      CARGO_BUILD_JOBS: "4"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 50
          ci-disk-guard /mnt/docker 10
          ci-disk-guard /mnt/ci-cache 10

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME" "$SCCACHE_DIR"

      - name: Pre-clean workspace
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          case "${GITHUB_WORKSPACE}" in
            /mnt/actions/_work/*/*) ;;
            *)
              echo "refusing to clean unexpected workspace: ${GITHUB_WORKSPACE}" >&2
              exit 1
              ;;
          esac
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          clean: false

      - name: Build Uselesskey CI image
        shell: bash
        run: docker build --pull=false -t uselesskey-ci-rust:1.95 -f .github/ci/uselesskey-rust-small.Dockerfile .github/ci

      - name: Clean workspace target
        shell: bash
        env:
          IMAGE: uselesskey-ci-rust:1.95
        run: |
          set -eu
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'rm -rf /workspace/target'

      - name: Run Uselesskey rust-small on CX43
        shell: bash
        env:
          IMAGE: uselesskey-ci-rust:1.95
        run: |
          set -euo pipefail
          docker run --rm \
            --cpus="6" \
            --memory="12g" \
            -e CARGO_HOME=/cargo-home \
            -e SCCACHE_DIR=/sccache \
            -e SCCACHE_CACHE_SIZE="${SCCACHE_CACHE_SIZE}" \
            -e RUSTC_WRAPPER=/usr/local/cargo/bin/sccache \
            -e CARGO_INCREMENTAL="${CARGO_INCREMENTAL}" \
            -e CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS}" \
            -e CARGO_TARGET_DIR=/cargo-target \
            -e TMPDIR=/tmp/jobtmp \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${CARGO_HOME}:/cargo-home" \
            -v "${SCCACHE_DIR}:/sccache" \
            -v "${CARGO_TARGET_DIR}:/cargo-target" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -w /workspace \
            "${IMAGE}" \
            bash -eu -o pipefail -c '
              rustc --version
              cargo --version
              cargo deny --version
              cargo fuzz --version
              cargo mutants --version
              typos --version
              nasm -v
              sccache --version || true
              git config --global --add safe.directory /workspace
              cargo deny check advisories
              cargo xtask pr
              cargo xtask docs-sync --check
              cargo xtask examples-smoke
              sccache --show-stats || true
            '
          if [ -f "${CARGO_TARGET_DIR}/xtask/receipt.json" ]; then
            mkdir -p target/xtask
            cp "${CARGO_TARGET_DIR}/xtask/receipt.json" target/xtask/receipt.json
          fi

      - name: Upload receipt
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: receipt-rust-small-cx43
          path: target/xtask/receipt.json
          if-no-files-found: warn

      - name: Cleanup workspace target
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'rm -rf /workspace/target' || true

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          docker run --rm \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -v "${CARGO_TARGET_DIR}:/cargo-target" \
            "${IMAGE}" \
            bash -c '
              rm -rf /tmp/jobtmp/* /tmp/jobtmp/.[!.]* /tmp/jobtmp/..?* 2>/dev/null || true
              rm -rf /cargo-target/* /cargo-target/.[!.]* /cargo-target/..?* 2>/dev/null || true
            ' || true
          rmdir "$TMPDIR" 2>/dev/null || true
          rmdir "$CARGO_TARGET_DIR" 2>/dev/null || true

      - name: Disk report
        if: always()
        shell: bash
        run: df -h / /mnt/docker /mnt/actions /mnt/ci-scratch /mnt/ci-cache /mnt/ci-artifacts 2>/dev/null || true

  uselesskey-rust-small-cx53:
    name: Uselesskey Rust Small on CX53
    needs: route-uselesskey-rust-small
    if: needs.route-uselesskey-rust-small.outputs.target == 'cx53' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx53, rust-large, trusted-pr]
    timeout-minutes: 90
    env:
      CARGO_HOME: /mnt/ci-cache/cargo-home
      SCCACHE_DIR: /mnt/ci-cache/sccache
      SCCACHE_CACHE_SIZE: 60G
      RUSTC_WRAPPER: /usr/local/cargo/bin/sccache
      CARGO_BUILD_JOBS: "12"
      TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
      CARGO_TARGET_DIR: /mnt/ci-scratch/target/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 100
          ci-disk-guard /mnt/docker 20
          ci-disk-guard /mnt/ci-cache 20

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME" "$SCCACHE_DIR"

      - name: Pre-clean workspace
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
          case "${GITHUB_WORKSPACE}" in
            /mnt/actions/_work/*/*) ;;
            *)
              echo "refusing to clean unexpected workspace: ${GITHUB_WORKSPACE}" >&2
              exit 1
              ;;
          esac
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          clean: false

      - name: Build Uselesskey CI image
        shell: bash
        run: docker build --pull=false -t uselesskey-ci-rust:1.95 -f .github/ci/uselesskey-rust-small.Dockerfile .github/ci

      - name: Clean workspace target
        shell: bash
        env:
          IMAGE: uselesskey-ci-rust:1.95
        run: |
          set -eu
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            "${IMAGE}" \
            bash -c 'rm -rf /workspace/target'

      - name: Run Uselesskey rust-small on CX53
        shell: bash
        env:
          IMAGE: uselesskey-ci-rust:1.95
        run: |
          set -euo pipefail
          docker run --rm \
            --cpus="14" \
            --memory="28g" \
            -e CARGO_HOME=/cargo-home \
            -e SCCACHE_DIR=/sccache \
            -e SCCACHE_CACHE_SIZE="${SCCACHE_CACHE_SIZE}" \
            -e RUSTC_WRAPPER=/usr/local/cargo/bin/sccache \
            -e CARGO_INCREMENTAL="${CARGO_INCREMENTAL}" \
            -e CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS}" \
            -e CARGO_TARGET_DIR=/cargo-target \
            -e TMPDIR=/tmp/jobtmp \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${CARGO_HOME}:/cargo-home" \
            -v "${SCCACHE_DIR}:/sccache" \
            -v "${CARGO_TARGET_DIR}:/cargo-target" \
            -v "${TMPDIR}:/tmp/jobtmp" \
            -w /workspace \
            "${IMAGE}" \
            bash -eu -o pipefail -c '
              rustc --version
              cargo --version
              cargo deny --version
              cargo fuzz --version
              cargo mutants --version
              typos --version
              nasm -v
              sccache --version || true
              git config --global --add safe.directory /workspace
              cargo deny check advisories
              cargo xtask pr
              cargo xtask docs-sync --check
              cargo xtask examples-smoke
              sccache --show-stats || true
            '
          if [ -f "${CARGO_TARGET_DIR}/xtask/receipt.json" ]; then
            mkdir -p target/xtask
            cp "${CARGO_TARGET_DIR}/xtask/receipt.json" target/xtask/receipt.json
          fi

      - name: Upload receipt
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: receipt-rust-small-cx53
          path: target/xtask/receipt.json
          if-no-files-found: warn

      - name: Cleanup workspace target
        if: always()
        shell: bash
        env:
          IMAGE: em-ci-rust:1.95
        run: |
          set -eu
