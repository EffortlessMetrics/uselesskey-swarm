name: Mutation

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:
    inputs:
      scope:
        description: Mutation evidence scope.
        required: true
        default: public
        type: choice
        options:
          - public
          - adapters
          - all
          - crate
      crate:
        description: Crate name when scope is crate.
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      # actions/checkout@v6
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Nightly mutation evidence
        shell: bash
        run: |
          scope="${{ inputs.scope }}"
          crate_name="${{ inputs.crate }}"

          if [[ -z "$scope" ]]; then
            scope="public"
          fi

          args=(--scope "$scope")
          if [[ "$scope" == "crate" ]]; then
            if [[ -z "$crate_name" ]]; then
              echo "::error::workflow_dispatch scope=crate requires the crate input"
              exit 1
            fi
            args+=(--crate "$crate_name")
          fi

          cargo xtask mutants-nightly "${args[@]}"

      # actions/upload-artifact@v7
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: mutation-nightly
          path: target/mutation
          if-no-files-found: warn
