name: Performance Evidence

# NOTE: This lane moved from GitHub-hosted ubuntu-latest to the shared
# self-hosted em-ci-small fleet. Performance numbers are host-sensitive, so the
# committed baselines in docs/metadata/perf-baselines.json were calibrated on
# the previous hosted hardware. They MUST be recalibrated on the self-hosted
# box before any baseline comparison is trusted as a gate; until then only
# entries with `enforce_in_ci = true` block, and those should be reviewed.
on:
  schedule:
    - cron: "37 8 * * 1"
  workflow_dispatch:
    inputs:
      compare:
        description: Compare latest measurements against docs/metadata/perf-baselines.json.
        required: true
        default: true
        type: boolean

permissions:
  contents: read

# Performance is a proof/evidence lane: do not cancel an in-progress
# measurement; only the latest pending run waits.
concurrency:
  group: performance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Shared registry/git cache keeps dependency downloads warm. The build target
  # stays in the workspace so the perf report paths below are unchanged.
  CARGO_HOME: /mnt/ci-cache/cargo-home
  TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  perf:
    name: perf
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cx43, rust-medium, trusted-pr]
    timeout-minutes: 60
    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 20
          ci-disk-guard /mnt/ci-cache 10

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_HOME"

      # actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Run performance evidence
        shell: bash
        run: |
          set -euo pipefail
          compare="${{ inputs.compare }}"

          args=()
          if [[ -z "$compare" || "$compare" == "true" ]]; then
            args+=(--compare)
          fi

          cargo xtask perf "${args[@]}"

      - name: Write performance receipt summary
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          out_dir = Path("target/xtask/perf")
          out_dir.mkdir(parents=True, exist_ok=True)
          latest_path = out_dir / "latest.json"
          markdown_path = out_dir / "latest.md"

          lines = ["# Performance Evidence", ""]

          if latest_path.exists():
              latest = json.loads(latest_path.read_text(encoding="utf-8"))
              scenarios = latest.get("scenarios") or []
              lines.append(f"- Schema version: `{latest.get('version', 'unknown')}`")
              lines.append(f"- Generated at unix: `{latest.get('generated_at_unix', 'unknown')}`")
              lines.append(f"- Scenarios: `{len(scenarios)}`")
              lines.append("")
              lines.append("| Scenario | Group | Iterations | Median ns | Mean ns | Output bytes |")
              lines.append("| --- | --- | ---: | ---: | ---: | ---: |")
              for scenario in scenarios:
                  lines.append(
                      "| `{id}` | `{group}` | {iterations} | {median_ns} | {mean_ns} | {output_bytes} |".format(
                          id=scenario.get("id", ""),
                          group=scenario.get("group", ""),
                          iterations=scenario.get("iterations", 0),
                          median_ns=scenario.get("median_ns", 0),
                          mean_ns=scenario.get("mean_ns", 0),
                          output_bytes=scenario.get("output_bytes", 0),
                      )
                  )
          else:
              lines.append("- Status: `missing latest.json`")
              lines.append("- The benchmark command failed before writing a report.")

          lines.append("")
          lines.append("## Claim Boundary")
          lines.append("")
          lines.append("- Performance evidence is host- and runner-sensitive.")
          lines.append("- It guards fixture-generation cost trends, not cryptographic correctness.")
          lines.append("- Baseline comparison only blocks entries with `enforce_in_ci = true`.")
          lines.append("- Baselines need recalibration after the move to self-hosted hardware.")

          text = "\n".join(lines) + "\n"
          markdown_path.write_text(text, encoding="utf-8")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write(text)
          else:
              print(text)
          PY

      # actions/upload-artifact@v7
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: performance-evidence
          path: target/xtask/perf
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set +e
          rm -rf target "$TMPDIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true
