name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install NASM (for aws-lc-rs)
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Quality gate
        run: cargo xtask gate

      - name: Publish preflight
        run: cargo xtask publish-preflight

      - name: Publish dry-run
        run: cargo xtask publish-check

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install NASM (for aws-lc-rs)
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish all crates
        run: cargo xtask publish

      - name: Upload publish state
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-state
          path: target/xtask/publish-state.json
          if-no-files-found: ignore

  release:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
