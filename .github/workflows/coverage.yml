name: Coverage

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "tests/**"
      - "xtask/**"
      - ".github/workflows/coverage.yml"
      - "codecov.yml"
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "tests/**"
      - "xtask/**"
      - ".github/workflows/coverage.yml"
      - "codecov.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_BUILD_JOBS: "4"
  RUST_TEST_THREADS: "2"
  RUSTFLAGS: "-C debuginfo=0"
  # Shared registry/git cache on the self-hosted fleet keeps dependency
  # downloads warm across runs. The per-run scratch target dir keeps
  # concurrent runs isolated. sccache is intentionally not wired in here:
  # cargo-llvm-cov compiles with `-C instrument-coverage`, which defeats
  # compilation caching, so the win is not worth the extra moving part.
  CARGO_HOME: /mnt/ci-cache/cargo-home
  TMPDIR: /mnt/ci-scratch/tmp/${{ github.run_id }}-${{ github.run_attempt }}
  CARGO_TARGET_DIR: /mnt/ci-scratch/uselesskey-coverage/${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  coverage:
    name: Codecov Coverage
    runs-on:
      group: em-ci-small
      labels: [self-hosted, linux, x64, em-ci, cpx42, rust-16gb, rust-medium, trusted-pr]
    timeout-minutes: 90

    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'coverage') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci')

    steps:
      - name: Disk guards
        shell: bash
        run: |
          set -euo pipefail
          ci-disk-guard /mnt/ci-scratch 45
          ci-disk-guard /mnt/ci-cache 10

      - name: Prepare scratch dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR" "$CARGO_TARGET_DIR" "$CARGO_HOME"

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Preflight
        shell: bash
        run: |
          set -euo pipefail
          df -h /mnt/ci-scratch /mnt/ci-cache || true
          rustc --version
          cargo --version
          cargo llvm-cov --version
          nasm -v || true

      - name: Generate coverage
        env:
          CI: true
        run: |
          set -euo pipefail
          cargo llvm-cov clean --workspace

          cargo llvm-cov test \
            --workspace \
            --locked \
            --all-features \
            --exclude uselesskey-bench \
            --exclude uselesskey-bdd \
            --no-report \
            -- --test-threads=2

          cargo llvm-cov report --json --output-path coverage.json
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --text | tee coverage.txt

      - name: Validate coverage output
        run: |
          set -euo pipefail
          test -s coverage.json
          test -s lcov.info
          test -s coverage.txt

      - name: Generate coverage receipt
        run: |
          set -euo pipefail
          mkdir -p target/coverage
          python3 - <<'PYTHON'
          import json
          import pathlib

          receipt = {
              "schema_version": 1,
              "repo": "uselesskey",
              "lane": "coverage",
              "flag": "rust-fixtures",
              "workflow": "Coverage",
              "artifacts": {
                  "coverage_json": pathlib.Path("coverage.json").exists(),
                  "coverage_text": pathlib.Path("coverage.txt").exists(),
                  "lcov": pathlib.Path("lcov.info").exists(),
              },
              "claim_boundary": [
                  "execution_surface_only",
                  "not_crypto_correctness",
                  "not_derivation_stability",
                  "not_mutation_adequacy",
                  "not_publish_preflight",
              ],
          }
          pathlib.Path("target/coverage/coverage-receipt.json").write_text(
              json.dumps(receipt, indent=2) + "\n",
              encoding="utf-8",
          )
          PYTHON

      - name: Validate coverage receipt
        run: |
          set -euo pipefail
          test -s target/coverage/coverage-receipt.json
          python3 -m json.tool target/coverage/coverage-receipt.json > /dev/null
      - name: Detect Codecov token
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "${CODECOV_TOKEN:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov
        if: ${{ steps.codecov-token.outputs.present == 'true' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust-fixtures
          name: uselesskey-rust-fixtures
          fail_ci_if_error: ${{ github.event_name == 'push' }}

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage.txt
            lcov.info
            target/coverage/coverage-receipt.json
          retention-days: 14

      - name: Cleanup scratch dirs
        if: always()
        shell: bash
        run: |
          set +e
          rm -rf "$TMPDIR" "$CARGO_TARGET_DIR"
          df -h /mnt/ci-scratch /mnt/ci-cache || true
