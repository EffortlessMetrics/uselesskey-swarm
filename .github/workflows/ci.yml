name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Cancel redundant runs: on PRs cancel previous runs for the same PR;
# on main each push gets its own run.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  perf:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install NASM (for aws-lc-rs)
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: xtask perf compare
        run: cargo xtask perf --compare

  pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install NASM (for aws-lc-rs)
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz,cargo-mutants,typos-cli,cargo-deny

      - name: Install ripr
        run: cargo install ripr --locked

      - name: Toolchain diagnostics
        run: |
          rustc -vV
          cargo +nightly -vV
          cargo fuzz --version || true

      - name: Fetch base branch
        if: github.base_ref != ''
        run: git fetch origin ${{ github.base_ref }}

      - name: cargo deny advisories
        run: cargo deny check advisories

      - name: ripr PR evidence
        id: ripr_pr
        run: cargo xtask ripr-pr

      - name: ripr review guidance
        id: ripr_review
        run: cargo xtask ripr-review-comments

      - name: ripr PR contract
        if: always()
        run: cargo xtask ripr-pr --check

      - name: ripr review contract
        if: always()
        run: cargo xtask ripr-review-comments --check

      - name: ripr annotations
        if: always()
        run: python scripts/ripr-annotations.py

      - name: ripr review summary
        if: always()
        shell: bash
        run: |
          {
            echo "## RIPR Review Guidance"
            echo
            if [ -f target/ripr/review/comments.md ]; then
              cat target/ripr/review/comments.md
            else
              echo "No RIPR review guidance was produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: impacted evidence
        id: impacted_evidence
        shell: bash
        run: |
          cargo xtask impacted-evidence
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          impacted = json.loads(Path("target/xtask/impacted-evidence/latest.json").read_text())
          ripr = impacted.get("ripr") or {}

          print(f"requires_targeted_mutation={str(bool(impacted.get('requires_targeted_mutation'))).lower()}")
          print(f"ripr_severe_gap={str(bool(ripr.get('requires_targeted_evidence'))).lower()}")
          PY

      - name: ripr PR summary
        if: always()
        run: cargo xtask ripr-pr-summary

      - name: ripr PR summary contract
        if: always()
        run: cargo xtask ripr-pr-summary --check

      - name: xtask pr
        id: xtask_pr
        run: cargo xtask pr

      - name: targeted full-owner mutation
        id: targeted_full_owner_mutation
        if: ${{ contains(github.event.pull_request.labels.*.name, 'mutation/full-owner') }}
        run: cargo xtask mutants-pr --changed --full-owner

      - name: targeted mutation
        id: targeted_mutation
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'mutation/full-owner') && (contains(github.event.pull_request.labels.*.name, 'mutation') || contains(github.event.pull_request.labels.*.name, 'release-risk') || steps.impacted_evidence.outputs.requires_targeted_mutation == 'true' || steps.impacted_evidence.outputs.ripr_severe_gap == 'true') }}
        run: cargo xtask mutants-pr --changed

      - name: docs-sync check
        id: docs_sync
        run: cargo xtask docs-sync --check

      - name: publish preflight
        id: publish_preflight
        run: cargo xtask publish-preflight

      - name: examples smoke check
        id: examples_smoke
        run: cargo xtask examples-smoke

      - name: economics receipt
        id: economics_receipt
        run: cargo xtask economics

      - name: audit-surface receipt
        id: audit_surface_receipt
        run: cargo xtask audit-surface

      - name: receipt docs drift check
        id: receipt_docs_drift
        run: git diff --exit-code -- docs/reference/dependency-economics.md docs/reference/audit-surface.md

      - name: PR evidence summary
        if: always()
        shell: bash
        run: |
          if [ -f target/ripr/pr/summary.md ]; then
            cat target/ripr/pr/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# PR Evidence Summary"
              echo
              echo "No PR evidence summary was produced."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload lane receipts
        uses: actions/upload-artifact@v7
        with:
          name: lane-receipts-pr
          path: |
            target/xtask/economics/latest.json
            target/xtask/economics/latest.md
            target/xtask/audit-surface/latest.json
            target/xtask/audit-surface/latest.md
            docs/reference/dependency-economics.md
            docs/reference/audit-surface.md
        if: always()

      - name: Upload ripr PR evidence
        uses: actions/upload-artifact@v7
        with:
          name: ripr-pr
          path: target/ripr/pr
          if-no-files-found: warn
        if: always()

      - name: Upload ripr review guidance
        uses: actions/upload-artifact@v7
        with:
          name: ripr-review
          path: target/ripr/review
          if-no-files-found: warn
        if: always()

      - name: Upload impacted evidence
        uses: actions/upload-artifact@v7
        with:
          name: impacted-evidence
          path: target/xtask/impacted-evidence
          if-no-files-found: warn
        if: always()

      - name: Upload receipt
        uses: actions/upload-artifact@v7
        with:
          name: receipt-pr
          path: target/xtask/receipt.json
        if: always()

  main:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install NASM (for aws-lc-rs)
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz,cargo-mutants,typos-cli,cargo-deny

      - name: Toolchain diagnostics
        run: |
          rustc -vV
          cargo +nightly -vV
          cargo fuzz --version || true

      - name: xtask ci
        run: cargo xtask ci

      - name: publish preflight
        run: cargo xtask publish-preflight

      - name: economics receipt
        run: cargo xtask economics

      - name: audit-surface receipt
        run: cargo xtask audit-surface

      - name: receipt docs drift check
        run: git diff --exit-code -- docs/reference/dependency-economics.md docs/reference/audit-surface.md

      - name: Upload lane receipts
        uses: actions/upload-artifact@v7
        with:
          name: lane-receipts-main
          path: |
            target/xtask/economics/latest.json
            target/xtask/economics/latest.md
            target/xtask/audit-surface/latest.json
            target/xtask/audit-surface/latest.md
            docs/reference/dependency-economics.md
            docs/reference/audit-surface.md
        if: always()

      - name: Clean target test scratch dirs
        if: always()
        run: rm -rf target/tests

      - name: Upload receipt
        uses: actions/upload-artifact@v7
        with:
          name: receipt-main
          path: target/xtask/receipt.json
        if: always()
