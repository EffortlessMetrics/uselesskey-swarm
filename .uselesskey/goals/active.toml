schema_version = "1.0"

id = "v0.10.0-release-readiness"
title = "v0.10.0 release readiness"
status = "active"
owner = "codex"
created = "2026-05-21"

objective = """
Prove that the v0.10.0 release candidate matches the documented user path
without publishing, tagging, signing, pushing to crates.io, creating a GitHub
release, or moving source-sync authority out of EffortlessMetrics/uselesskey.
"""

end_state = [
  "Release-facing user commands and snippets are inventoried with proof owners.",
  "Version snippets are reconciled for current stable versus release-candidate wording.",
  "Installed CLI bundle, verify, inspect, and audit paths are proven for the release candidate.",
  "Facade examples are proven against the release candidate checkout.",
  "Package contents are dry-run validated without generated payloads or target receipts.",
  "A release readiness record states proof, hosted CI, non-blockers, rollback, and claim boundaries.",
]

