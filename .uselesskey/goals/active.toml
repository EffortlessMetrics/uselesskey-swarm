id = "uselesskey-v0.10.0-external-adoption"
title = "v0.10.0 external adoption and installed-user workflows"
status = "active"
owner = "EffortlessMetrics"
created = "2026-05-17"

objective = """
Make uselesskey useful from outside the repo. A user should be able to install
the CLI or add the crate to a clean project, copy documented snippets, generate
scanner-safe/TLS/OIDC/webhook fixtures, inspect or verify bundles, and
understand the proof boundary without learning xtask or release machinery.
"""

end_state = [
  "Clean-project external adoption smoke exists for local path mode and writes Markdown/JSON receipts.",
  "Published-version external adoption smoke is available as an audit/reference mode, not a release trigger.",
  "Installed CLI user docs are clearly separated from repo-local proof and maintainer docs.",
  "Clean-project examples cover webhook, OIDC/JWKS, TLS, and Rust test fixture adoption paths.",
  "CLI profile, bundle explain, and inspect output make generated files, scanner-safety, runtime material, proof path, and boundaries clear.",
  "The installed proof handoff boundary is decided before adding any executable proof command.",
  "Any external adoption proof remains metadata-aware and does not create provider compatibility or production security claims.",
  "The lane closes without a version bump, tag, publish, new badge, or new contract pack.",
]

